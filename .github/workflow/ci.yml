name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Install dependencies
      # =========================
      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            clang \
            clang-format \
            clang-tidy \
            clang-tools

      # =========================
      # Configure (generate compile_commands.json)
      # =========================
      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      # =========================
      # Build
      # =========================
      - name: Build
        run: |
          cmake --build build -j

      # =========================
      # Run tests
      # =========================
      - name: Run parser tests
        run: |
          ./build/parser_encoder_test

      # =========================
      # clang-format (FULL coverage)
      # =========================
      - name: Check code formatting
        run: |
          files=$(git ls-files '*.c' '*.h')
          clang-format --dry-run --Werror $files

      # =========================
      # clang-tidy (FULL coverage via compile_commands)
      # =========================
      - name: Run clang-tidy
        run: |
          run-clang-tidy -p build -j $(nproc)