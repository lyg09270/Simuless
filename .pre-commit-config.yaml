repos:
  # =========================
  # Basic text / file checks
  # =========================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files

  # =========================
  # C / C++ format
  # =========================
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v17.0.6
    hooks:
      - id: clang-format
        args: ["-i"]

  # =========================
  # CMake checks
  # =========================
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      # auto-fix first
      - id: cmake-format

      # then lint
      - id: cmake-lint
        args:
          - "--config=.cmakelintrc"

  # =========================
  # Local system tools
  # =========================
  - repo: local
    hooks:
      # ---------- clang-tidy ----------
      - id: clang-tidy
        name: clang-tidy
        entry: clang-tidy
        language: system
        types: [c, c++]
        pass_filenames: true
        args:
          - "--config-file=.clang-tidy.yaml"
          - "--fix"
          - "--fix-errors"
